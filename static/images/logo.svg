<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334EAC"/>
      <stop offset="50%" style="stop-color:#5A6EC5"/>
      <stop offset="100%" style="stop-color:#7098D1"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#334EAC"/>
      <stop offset="100%" style="stop-color:#BAD6EB"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Subtle scanner circle -->
  <circle cx="24" cy="24" r="22" stroke="#BAD6EB" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="4 4"/>
  
  <!-- Main brain outline - minimalist stylized -->
  <g filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M22 8 C12 8 8 14 8 24 C8 34 12 40 22 40" 
          stroke="url(#mainGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Right hemisphere -->
    <path d="M26 8 C36 8 40 14 40 24 C40 34 36 40 26 40" 
          stroke="url(#mainGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Brain detail curves - left -->
    <path d="M18 14 C13 18 13 22 16 26" 
          stroke="#334EAC" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M14 24 C12 30 14 34 18 36" 
          stroke="#334EAC" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Brain detail curves - right -->
    <path d="M30 14 C35 18 35 22 32 26" 
          stroke="#7098D1" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M34 24 C36 30 34 34 30 36" 
          stroke="#7098D1" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Center connection - corpus callosum style -->
  <ellipse cx="24" cy="24" rx="2" ry="10" stroke="#5A6EC5" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- AI Detection crosshair/target - subtle -->
  <circle cx="30" cy="18" r="5" stroke="#334EAC" stroke-width="1.5" fill="none" opacity="0.7" stroke-dasharray="2 2"/>
  <circle cx="30" cy="18" r="2" fill="#334EAC" opacity="0.5"/>
  
  <!-- Neural network nodes -->
  <circle cx="24" cy="6" r="1.5" fill="#334EAC" opacity="0.8"/>
  <circle cx="24" cy="42" r="1.5" fill="#7098D1" opacity="0.8"/>
  <circle cx="6" cy="24" r="1.5" fill="#334EAC" opacity="0.8"/>
  <circle cx="42" cy="24" r="1.5" fill="#7098D1" opacity="0.8"/>
</svg>
