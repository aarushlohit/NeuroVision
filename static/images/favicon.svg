<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334EAC"/>
      <stop offset="100%" style="stop-color:#5A6EC5"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#BAD6EB"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#bgGrad)"/>
  
  <!-- Minimalist brain icon -->
  <g transform="translate(16, 16)">
    <!-- Left hemisphere -->
    <path d="M-1.5 -7 C-7 -7 -9 -3.5 -9 0 C-9 3.5 -7 7 -1.5 7" 
          stroke="url(#brainGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Right hemisphere -->
    <path d="M1.5 -7 C7 -7 9 -3.5 9 0 C9 3.5 7 7 1.5 7" 
          stroke="url(#brainGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    
    <!-- Simple brain detail -->
    <path d="M-3 -4 C-5 -2 -5 1 -3 3" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M3 -4 C5 -2 5 1 3 3" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Detection marker -->
  <circle cx="21" cy="12" r="3" stroke="white" stroke-width="1" fill="none" opacity="0.7" stroke-dasharray="1.5 1.5"/>
  <circle cx="21" cy="12" r="1" fill="white" opacity="0.6"/>
</svg>
